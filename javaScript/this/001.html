  <script>

    // no good 因为每一次调用 函数foo都是普通函数，普通函数this指向window。所以无法获取正确的count
    function foo(num) {
      console.log("foo", num);
      console.log(this);

      this.count++;
    }

    foo.count = 0;
    var i;
    for (i = 0; i < 10; i++) {
      if (i > 5) {
        foo(i);
      }
    }
    console.log(foo.count);

    // window.name = 'globalName';
    const myObj = {
      name: 'liu',
      getName: function () {
        return this.name
      }
    }
    const getName = myObj.getName
    console.log(myObj.getName()); // liu
    console.log(getName()); // globalName


  </script>
